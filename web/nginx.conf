server {
  listen 80;

  # Serve the built React app.
  location / {
    root /usr/share/nginx/html;
    # Single-page app: unknown paths must return index.html, not a 404.
    try_files $uri /index.html;
  }

  # In production there is no Vite dev server, so its proxy is gone.
  # nginx takes over that job. "api" is the Compose service name.
  location /api/ {
    proxy_pass http://api:3000;
  }
}
